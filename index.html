<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canvas Undo/Redo/Reset</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="board"></canvas>
<div id="toolbar">
  <button id="resetBtn">Reset</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
</div>
<div id="hint">Use Ctrl+Z for UNDO, Ctrl+Y for REDO & Ctrl+R for RESET</div>
<script src="main.js"></script>
</body>
</html>
